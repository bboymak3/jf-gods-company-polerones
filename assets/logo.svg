    <text x="0" y="38" font-size="13" font-weight="700" fill="#2E7D32">Personalizados</text>
    <text x="0" y="52" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="1.5">SANTIAGO DE CHILE</text>
    <rect x="0" y="55" width="90" height="2" rx="1" fill="url(#polGrad)"/>
  </g>
</svg>
