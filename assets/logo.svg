<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Polerones Personalizados Santiago">
  <defs>
    <linearGradient id="polGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- T-shirt icon (left) -->
  <g transform="translate(6, 8)">
    <!-- T-shirt body -->
    <path d="M10 8 L0 14 L4 22 L10 19 L10 44 L34 44 L34 19 L40 22 L44 14 L34 8 L28 8 C28 12 25 14 22 14 C19 14 16 12 16 8 Z" fill="url(#polGrad)" stroke="#1B5E20" stroke-width="0.8"/>
    <!-- Collar -->
    <path d="M16 8 C16 12 19 14 22 14 C25 14 28 12 28 8" fill="none" stroke="#1B5E20" stroke-width="1"/>
